name: crystal_messenger
description: "Crystal Messenger — Production-grade real-time messaging app."
publish_to: 'none'
version: 1.1.0+2

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # ── Core ────────────────────────────────────────────────────────────────────
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0

  # ── Backend ──────────────────────────────────────────────────────────────────
  supabase_flutter: ^2.5.0
  flutter_dotenv: ^6.0.1

  # ── Local Storage / Offline Caching ─────────────────────────────────────────
  path_provider: ^2.1.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # ── UI / Design ───────────────────────────────────────────────────────────────
  google_fonts: ^6.2.1
  glassmorphism_ui: ^0.3.0
  flutter_animate: ^4.5.0
  cached_network_image: ^3.3.1

  # ── Notifications ─────────────────────────────────────────────────────────────
  flutter_local_notifications: ^17.2.1

  # ── Media ─────────────────────────────────────────────────────────────────────
  image_picker: ^1.1.2
  permission_handler: ^11.3.1
  file_picker: ^11.0.2

  # ── Audio (Voice Notes) ───────────────────────────────────────────────────────
  record: ^5.1.2
  audioplayers: ^6.0.0

  # ── Real-time Calling (WebRTC P2P) ────────────────────────────────────────────
  flutter_webrtc: ^1.4.1

  # ── Contact Syncing ───────────────────────────────────────────────────────────
  flutter_contacts: ^2.0.2

  # ── Monetization (AdMob) ──────────────────────────────────────────────────────
  google_mobile_ads: ^5.2.0

  # ── Utilities ─────────────────────────────────────────────────────────────────
  uuid: ^4.4.2
  timeago: ^3.7.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/sounds/
    - .env

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/icon.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/images/icon.png"
    background_color: "#075E54"
    theme_color: "#25D366"
  windows:
    generate: true
    image_path: "assets/images/icon.png"
    icon_size: 48
  macos:
    generate: true
    image_path: "assets/images/icon.png"