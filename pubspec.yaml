name: crystal_messenger
description: Crystal Messenger - a premium ephemeral cross-platform messenger built with Flutter and Supabase.
version: 0.1.0+1
environment:
  sdk: ">=2.17.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.3.6

  # Supabase
  supabase_flutter: ^1.4.0

  # WebRTC
  flutter_webrtc: ^0.9.18

  # Storage / media
  image_picker: ^0.8.7+5
  file_picker: ^5.2.5
  permission_handler: ^10.4.2

  # Audio recording / playback for voice notes
  record: ^4.4.4
  just_audio: ^0.9.36

  # Local DB / cache
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.0.15

  # Utilities
  uuid: ^3.0.7
  intl: ^0.18.1
  url_launcher: ^6.1.7
  flutter_dotenv: ^5.0.2
  logger: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.0
  build_runner: ^2.4.6

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
