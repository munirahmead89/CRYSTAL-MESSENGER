<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download Crystal Messenger - Premium Messaging</title>
    <style>
        :root {
            --primary: #075E54;
            --secondary: #25D366;
            --glass: rgba(255, 255, 255, 0.1);
        }
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #075E54 0%, #128C7E 100%);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }
        .container {
            max-width: 800px;
            padding: 40px;
            background: var(---glass);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        h1 { font-size: 3rem; margin-bottom: 10px; font-weight: 800; }
        p.subtitle { font-size: 1.2rem; color: rgba(255, 255, 255, 0.8); margin-bottom: 40px; }
        .download-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .card {
            background: rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: 20px;
            transition: all 0.3s ease;
            cursor: pointer;
            border: 1px solid transparent;
        }
        .card:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-10px);
            border-color: var(---secondary);
        }
        .card i { font-size: 3rem; margin-bottom: 15px; display: block; }
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 25px;
            background: var(---secondary);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 0.9rem;
        }
        .founder {
            margin-top: 50px;
            font-size: 0.8rem;
            letter-spacing: 2px;
            opacity: 0.6;
            text-transform: uppercase;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <h1>Crystal Messenger</h1>
        <p class="subtitle">Experience the future of secure, ephemeral messaging.</p>
        
        <div class="download-grid">
            <div class="card">
                <i class="fab fa-android"></i>
                <h3>Android</h3>
                <p>Direct APK Install</p>
                <a href="YOUR_ANDROID_LINK_HERE" class="btn">DOWNLOAD APK</a>
            </div>
            <div class="card">
                <i class="fab fa-windows"></i>
                <h3>Windows</h3>
                <p>Desktop Experience</p>
                <a href="YOUR_WINDOWS_LINK_HERE" class="btn">DOWNLOAD EXE</a>
            </div>
            <div class="card">
                <i class="fab fa-apple"></i>
                <h3>iOS</h3>
                <p>Coming Soon</p>
                <a href="#" class="btn" style="background: #444;">STORE LINK</a>
            </div>
        </div>

        <div class="founder">
            MUNIR WAHEED - THE FOUNDER OF CRYSTAL MESSENGER
        </div>
    </div>
</body>
</html>
